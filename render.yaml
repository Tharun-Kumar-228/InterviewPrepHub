services:
  # Monolithic Web Service (serving both Backend and Frontend)
  - type: web
    name: interviewprep-hub
    env: node
    plan: free
    buildCommand: npm run build-production
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Render will prompt you for this value during setup
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure key
      - key: JWT_EXPIRE
        value: 30d
      - key: REDIS_ENABLED
        value: "false"
