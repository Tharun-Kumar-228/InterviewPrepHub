services:
  # Backend Web Service
  - type: web
    name: interviewprep-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Render will prompt you for this value during setup
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure key
      - key: JWT_EXPIRE
        value: 30d
      - key: REDIS_ENABLED
        value: "false"

  # Frontend Static Site
  - type: web
    name: interviewprep-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://interviewprep-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
